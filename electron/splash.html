<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }
    .bg {
      position: absolute;
      inset: 0;
      background-image: url('./car.jfif');
      background-size: cover;
      background-position: center;
      filter: brightness(0.55);
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }
    .title {
      font-family: 'Segoe UI', sans-serif;
      font-size: 52px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 4px;
      text-shadow: 0 2px 24px rgba(0,0,0,0.7);
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .label {
      font-family: 'Segoe UI', sans-serif;
      font-size: 18px;
      color: rgba(255,255,255,0.75);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay">
    <div class="title">DRIVEHUB</div>
    <div class="spinner"></div>
    <div class="label">Starting...</div>
  </div>
</body>
</html>
